name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: vn7n24fez6/github-profile-summary-cards@release
        with:
          USERNAME: philipppollmann
          BRANCH_NAME: main
          UTCOFFSET: 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}